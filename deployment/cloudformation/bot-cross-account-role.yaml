AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Cross-account IAM role that allows the spore-bot Lambda (in spore-host-infra)
  to perform EC2 operations on instances in this account.

  Deploy this template in each AWS account that has instances you want to control
  via the Slack/Teams bot. The RoleArn output goes into `spawn bot register --role-arn`.

Parameters:
  BotLambdaRoleArn:
    Type: String
    Description: >
      ARN of the spore-bot Lambda execution role in spore-host-infra.
      Example: arn:aws:iam::966362334030:role/spore-bot-lambda
    AllowedPattern: 'arn:aws:iam::\d{12}:role/.+'
    ConstraintDescription: Must be a valid IAM role ARN

  TagPrefix:
    Type: String
    Default: spawn
    AllowedValues:
      - spawn
      - prism
    Description: >
      Tag namespace for instances managed by this bot.
      Use "spawn" for spore.host instances (spawn:managed=true),
      or "prism" for prism instances (prism:managed=true).

  RoleName:
    Type: String
    Default: SpawnBotCrossAccount
    Description: Name of the cross-account IAM role to create

  ExternalId:
    Type: String
    Default: ''
    Description: >
      STS ExternalId the spore-bot Lambda must present when assuming this role.
      Leave EMPTY to use the legacy shared value (TagPrefix + "-bot", e.g.
      "spawn-bot") that the Lambda falls back to. For per-account isolation
      (recommended), set this to the high-entropy value shown when you run
      `spawn bot register` (the register response returns `external_id`), and
      register the instance with that same value. Each account should use its
      own ExternalId.

  ScopeStartStopByTag:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'false'
      - 'true'
    Description: >
      When "true", ec2:StartInstances/StopInstances are restricted to instances
      tagged managed=true under the tag prefix (e.g. "spawn:managed=true") — the
      tag spawn applies to every instance it launches. When "false" (default),
      those actions are allowed on all instances and access is gated only by the
      spore-bot registry. Set to "true" for defense-in-depth once you have
      confirmed all bot-controlled instances in this account carry the managed
      tag.

Conditions:
  UseCustomExternalId: !Not [!Equals [!Ref ExternalId, '']]
  ScopeByTag: !Equals [!Ref ScopeStartStopByTag, 'true']
  IsPrism: !Equals [!Ref TagPrefix, 'prism']

Resources:

  BotCrossAccountRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      Description: !Sub 'Allows spore-bot Lambda to control ${TagPrefix}-managed EC2 instances'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref BotLambdaRoleArn
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                # Per-account ExternalId when provided; otherwise the legacy
                # shared "${TagPrefix}-bot" the Lambda still falls back to.
                sts:ExternalId: !If [UseCustomExternalId, !Ref ExternalId, !Sub '${TagPrefix}-bot']
      Policies:
        - PolicyName: BotEC2Policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Read instance state and metadata (needed for status/url commands)
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeTags
                  - ec2:DescribeInstanceStatus
                Resource: '*'
              # Start/stop/hibernate. With ScopeStartStopByTag=true these are
              # restricted to ${TagPrefix}:managed=true instances; otherwise
              # Resource "*" and access is enforced by the spore-bot DynamoDB
              # registry (enabled flag per registration).
              - !If
                - ScopeByTag
                - Effect: Allow
                  Action:
                    - ec2:StartInstances
                    - ec2:StopInstances
                  Resource: '*'
                  # IAM Condition map keys must be literal strings (no Fn::Sub),
                  # so select the whole key by TagPrefix (spawn|prism).
                  Condition:
                    StringEquals:
                      !If
                        - IsPrism
                        - 'aws:ResourceTag/prism:managed': 'true'
                        - 'aws:ResourceTag/spawn:managed': 'true'
                - Effect: Allow
                  Action:
                    - ec2:StartInstances
                    - ec2:StopInstances
                  # trivy:ignore:AVD-AWS-0057 -- Resource * is intentional when
                  # ScopeStartStopByTag=false; access control is enforced by the
                  # spore-bot DynamoDB registry (enabled flag per registration).
                  Resource: '*'
      Tags:
        - Key: !Sub '${TagPrefix}:managed'
          Value: 'false'
        - Key: Purpose
          Value: spore-bot-cross-account
        - Key: BotLambdaRoleArn
          Value: !Ref BotLambdaRoleArn

Outputs:
  RoleArn:
    Description: >
      Pass this ARN to `spawn bot register --role-arn` when registering instances
      in this account with the spore-bot.
    Value: !GetAtt BotCrossAccountRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-role-arn'

  ExternalId:
    Description: >
      External ID required when assuming this role. The per-account value when
      one was provided; otherwise the legacy shared value (TagPrefix + "-bot").
    Value: !If [UseCustomExternalId, !Ref ExternalId, !Sub '${TagPrefix}-bot']
