AWSTemplateFormatVersion: '2010-09-09'
Description: >
  The `vmimport` IAM service role required by `aws ec2 import-image` to read a
  VM disk image from S3 and create an AMI. Deploy in the account that will own
  the imported AMI. Trust + permissions follow the AWS VM Import/Export docs.
  Used by the spore.host Windows custom-AMI build (infra/amis/windows, #83).

Parameters:
  ImportBucket:
    Type: String
    Description: >
      S3 bucket holding the uploaded VM disk image(s) that import-image reads
      (the bucket import.sh uploads to).

Resources:
  # The role name MUST be exactly "vmimport" — ec2 import-image looks it up by
  # that fixed name.
  VMImportRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: vmimport
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vmie.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:Externalid: vmimport
      Policies:
        - PolicyName: vmimport-s3-ec2
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${ImportBucket}'
                  - !Sub 'arn:aws:s3:::${ImportBucket}/*'
              - Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:PutObject
                  - s3:GetBucketAcl
                Resource:
                  - !Sub 'arn:aws:s3:::${ImportBucket}'
                  - !Sub 'arn:aws:s3:::${ImportBucket}/*'
              - Effect: Allow
                Action:
                  - ec2:ModifySnapshotAttribute
                  - ec2:CopySnapshot
                  - ec2:RegisterImage
                  - ec2:Describe*
                Resource: '*'

Outputs:
  RoleName:
    Description: The vmimport role name (fixed; import-image requires exactly this).
    Value: !Ref VMImportRole
