AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  spawn TTL reaper — out-of-band backstop that terminates spawn-managed EC2
  instances past their spawn:ttl-deadline (or a hard max-age ceiling), even when
  the in-instance spored daemon is dead. Backstop, NOT a replacement for spored.
  See spore-host/spawn#70, #71.

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]
    Description: Deployment environment

  RoleArns:
    Type: CommaDelimitedList
    Default: 'arn:aws:iam::435415984226:role/spawn-ttl-reaper-ec2'
    Description: >
      Cross-account EC2 reaper role ARNs — ONE PER ACCOUNT that spawn launches
      spores into. A spore lands in whatever account the caller's credentials
      point at, so list every such account's role here. Deploy
      ttl-reaper-cross-account-role.yaml in each account to create these.

  ScanSelf:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >
      Also scan the Lambda's OWN account directly (no assume-role). Set true if
      spores are launched in the infra account too.

  Regions:
    Type: String
    Default: 'us-east-1,us-east-2,us-west-1,us-west-2,ca-central-1,eu-west-1,eu-west-2,eu-central-1,ap-southeast-1,ap-southeast-2,ap-northeast-1'
    Description: Comma-separated regions to scan (defaults to the 11 release-bucket regions)

  MaxAge:
    Type: String
    Default: '168h'
    Description: Hard max-age ceiling (Go duration); reaps even --no-timeout/missing-deadline instances older than this

  DryRun:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: When true, log "WOULD reap" + notify without terminating. Start true; flip to false after verifying.

  NotifyUrl:
    Type: String
    Default: ''
    Description: Slack-incoming-webhook URL for reap notifications (optional but recommended)

  Schedule:
    Type: String
    Default: 'rate(10 minutes)'
    Description: EventBridge schedule expression for the reaper

  DnsZoneId:
    Type: String
    Default: ''
    Description: >
      Route53 hosted zone ID for instance DNS (e.g. Z0341053304H0DQXF6U4X). When
      set together with DnsDomain, the reaper deletes a reaped instance's DNS
      records (#247) — spored's graceful DeleteDNS never ran. The zone is in the
      reaper's OWN account. Empty disables DNS teardown.

  DnsDomain:
    Type: String
    Default: ''
    Description: Domain for the hosted zone above (e.g. spore.host). Empty disables DNS teardown.

  DnsSweep:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >
      When true (and a zone is configured), the reaper also runs a DNS
      reconciliation sweep (#438): it lists each account's {base36}.{domain}
      A-records and deletes any whose IP has no live instance — catching records
      orphaned by abrupt exits (crash / out-of-band terminate / fast spot reclaim)
      that the instance-driven #247 teardown can't. Honors DryRun. Off by default.

Conditions:
  ScanSelfEnabled: !Equals [!Ref ScanSelf, 'true']
  DnsTeardownEnabled: !And
    - !Not [!Equals [!Ref DnsZoneId, '']]
    - !Not [!Equals [!Ref DnsDomain, '']]

Resources:
  TTLReaperFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub spawn-ttl-reaper-${Environment}
      Runtime: provided.al2023
      Architectures: [arm64]
      Handler: bootstrap
      CodeUri: .
      MemorySize: 256
      Timeout: 900
      Environment:
        Variables:
          REAPER_ROLE_ARNS: !Join [',', !Ref RoleArns]
          REAPER_SCAN_SELF: !Ref ScanSelf
          EC2_EXTERNAL_ID: spawn-ttl-reaper
          REAPER_REGIONS: !Ref Regions
          REAPER_MAX_AGE: !Ref MaxAge
          REAPER_DRY_RUN: !Ref DryRun
          REAPER_NOTIFY_URL: !Ref NotifyUrl
          REAPER_DNS_ZONE_ID: !Ref DnsZoneId
          REAPER_DNS_DOMAIN: !Ref DnsDomain
          REAPER_DNS_SWEEP: !Ref DnsSweep
      Policies:
        # Assume each per-account role that actually describes/terminates EC2.
        - Statement:
            - Effect: Allow
              Action:
                - sts:AssumeRole
              Resource: !Ref RoleArns
        # When scanning the Lambda's own account directly (ScanSelf=true), it
        # needs describe/terminate locally too. Terminate is tag-scoped to
        # spawn:managed=true so the reaper can never touch unmanaged instances.
        - !If
            - ScanSelfEnabled
            - Statement:
                - Effect: Allow
                  Action:
                    - ec2:DescribeInstances
                    - ec2:DescribeTags
                  Resource: '*'
                - Effect: Allow
                  Action:
                    - ec2:TerminateInstances
                  Resource: '*'
                  Condition:
                    StringEquals:
                      ec2:ResourceTag/spawn:managed: 'true'
            - !Ref AWS::NoValue
        # DNS teardown (#247): delete a reaped instance's Route53 records, since
        # spored's graceful DeleteDNS never ran. Scoped to the single configured
        # hosted zone; ListResourceRecordSets is zone-level (needed to read the
        # exact record set before a Route53 DELETE). Only attached when DNS
        # teardown is configured.
        - !If
            - DnsTeardownEnabled
            - Statement:
                - Effect: Allow
                  Action:
                    - route53:ChangeResourceRecordSets
                    - route53:ListResourceRecordSets
                  Resource: !Sub 'arn:aws:route53:::hostedzone/${DnsZoneId}'
            - !Ref AWS::NoValue
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: !Ref Schedule
            Enabled: true

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/spawn-ttl-reaper-${Environment}
      RetentionInDays: 30

Outputs:
  FunctionArn:
    Description: ARN of the TTL reaper Lambda function
    Value: !GetAtt TTLReaperFunction.Arn
    Export:
      Name: !Sub ${Environment}-ttl-reaper-arn
  FunctionRoleArn:
    Description: Execution role ARN (trust this in the dev-account cross-account role)
    Value: !GetAtt TTLReaperFunctionRole.Arn
