name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Force bundled Node 20 actions (e.g. github-script inside
# codecov-action@v5) onto Node 24 ahead of GitHub's 2026-06-16 cutover.
# Belt-and-suspenders to the orion runner's /home/runner/.env (spore-host#345);
# this also covers GitHub-hosted fallback runs.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    # Self-hosted runner on orion.local (Apple M4 Pro, arm64). To fall back to
    # GitHub-hosted, change this line to: runs-on: ubuntu-latest
    runs-on: [self-hosted, orion]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.5'
          # cache MUST stay false on the self-hosted orion runners: their
          # filesystem persists between jobs, so ~/go/pkg/mod is already warm.
          # setup-go's cache *restore* untars its saved archive over those
          # existing files → "tar: Cannot open: File exists" and the job fails in
          # Setup Go before any code runs (recurring CI flake). Go reuses the
          # on-disk module cache directly; the setup-go cache is redundant here.
          cache: false

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -short -coverprofile=coverage.out ./...

      - name: Coverage gate
        env:
          # Ratchet floor — must not drop below this. Raise it as coverage
          # improves; target is 60% (see CLAUDE.md). Current: ~26.5%.
          MIN_COVERAGE: '26'
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {sub(/%/,"",$3); print $3}')
          echo "Total coverage: ${total}% (floor: ${MIN_COVERAGE}%)"
          awk -v t="$total" -v m="$MIN_COVERAGE" 'BEGIN { exit !(t+0 >= m+0) }' \
            || { echo "::error::coverage ${total}% is below floor ${MIN_COVERAGE}%"; exit 1; }

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          files: coverage.out
          fail_ci_if_error: false

      - name: Vet
        run: go vet ./...

      # The lambda/* directories are each their own Go module, so the root
      # `go test ./...` above does NOT descend into them — their tests would
      # otherwise never run in CI (#136). Build, vet, and test each one.
      - name: Lambda modules (build + vet + test)
        run: |
          set -e
          fail=0
          for mod in $(find lambda -name go.mod -maxdepth 2 | sort); do
            dir=$(dirname "$mod")
            echo "::group::$dir"
            ( cd "$dir" && go build ./... && go vet ./... && go test -short ./... ) || fail=1
            echo "::endgroup::"
          done
          exit $fail

  # Tier 0 E2E — the real spawn binary driven against the Substrate AWS
  # emulator. No AWS account/credentials; exercises the full CLI surface
  # (args → cobra → AWS client → Substrate) and asserts JSON, exit codes, and
  # emulator state. Cheap and deterministic, so it runs on every push/PR.
  e2e-tier0:
    name: E2E Tier 0 (Substrate)
    runs-on: [self-hosted, orion]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.5'
          # cache MUST stay false on the self-hosted orion runners: their
          # filesystem persists between jobs, so ~/go/pkg/mod is already warm.
          # setup-go's cache *restore* untars its saved archive over those
          # existing files → "tar: Cannot open: File exists" and the job fails in
          # Setup Go before any code runs (recurring CI flake). Go reuses the
          # on-disk module cache directly; the setup-go cache is redundant here.
          cache: false

      - name: Build spawn binary
        run: go build -o bin/spawn .

      - name: Tier 0 tests
        run: go test -tags=e2e_tier0 -timeout 30m ./test/e2e/
