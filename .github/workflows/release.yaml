name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write   # keyless cosign signing (Fulcio/Rekor) + spored KMS OIDC + provenance
  attestations: write   # actions/attest-build-provenance (SLSA)

jobs:
  goreleaser:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.5'

      # cosign for keyless CLI-artifact signing (the .goreleaser signs: block runs
      # `cosign sign-blob --bundle` over checksums.txt with this job's OIDC identity).
      # This is separate from spored's KMS signing in the S3-upload step below.
      - name: Install cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      # Hard-fail the tag if the committed reference (docs-gen/) is stale, so a
      # release can never ship a reference that lags the code. Same check as CI's
      # drift gate, run here as a pre-release guard.
      - name: Docs reference drift guard
        run: make check-docs

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}

      # SLSA build provenance for the CLI release archives (complements the cosign
      # signature — signature authenticates the publisher, attestation records how/
      # where it was built). Attests checksums.txt, which covers every artifact by
      # hash. Runs only on a successful GoReleaser build (dist/checksums.txt exists).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: 'dist/checksums.txt'

      # Run the spored S3 upload even if GoReleaser exited non-zero. GoReleaser's
      # LAST phase pushes the Homebrew/Scoop taps; an expired tap token fails that
      # step AFTER the binaries are already built into dist/ (spawn#280). The S3
      # upload depends only on those dist/ artifacts, so a tap-push failure must
      # NOT skip spored delivery to instances. `!cancelled()` runs on GoReleaser
      # success or failure (a genuinely early GoReleaser failure leaves dist/
      # empty, so this step then fails loudly with the missing-file error — the
      # correct signal, not a silent skip).
      - name: Configure AWS credentials
        if: ${{ !cancelled() }}
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: arn:aws:iam::966362334030:role/GitHubActions-spore-host-release
          role-session-name: spored-s3-upload
          aws-region: us-east-1

      - name: Upload spored binaries to S3
        if: ${{ !cancelled() }}
        env:
          # KMS asymmetric signing key (ECDSA_SHA_256) ARN/alias in the infra
          # account. Set as a repo variable once the key is provisioned; when
          # empty, signing is skipped and only sha256 is published (#440).
          SPORED_SIGNING_KEY_ID: ${{ vars.SPORED_SIGNING_KEY_ID }}
        run: |
          set -euo pipefail
          # Extract version from tag (v0.36.0 → 0.36.0)
          VERSION=${GITHUB_REF_NAME#v}
          PROJECT=spawn

          # Publish to EVERY region spawn operates in — matching defaultRegions in
          # lambda/ttl-reaper. Previously US-only, relying on a bootstrap fallback
          # to us-east-1; but a non-US bucket that still held a STALE, UNSIGNED
          # binary made the regional fetch succeed (so the fallback never fired) and
          # then the .sig lookup failed, hard-failing spored install region-wide
          # (#440). Keeping every regional bucket current with the signed binary
          # removes that failure mode. us-east-1 must stay (it IS the fallback).
          BUCKETS=(
            spawn-binaries-us-east-1
            spawn-binaries-us-east-2
            spawn-binaries-us-west-1
            spawn-binaries-us-west-2
            spawn-binaries-ca-central-1
            spawn-binaries-eu-west-1
            spawn-binaries-eu-west-2
            spawn-binaries-eu-central-1
            spawn-binaries-ap-southeast-1
            spawn-binaries-ap-southeast-2
            spawn-binaries-ap-northeast-1
          )

          # Checksums (computed once).
          amd_src="dist/spored_linux_amd64_v1/spored"
          arm_src="dist/spored_linux_arm64_v8.0/spored"
          win_src="dist/spored_windows_amd64_v1/spored.exe"
          sha256sum "$amd_src" | awk '{print $1}' > spored-linux-amd64.sha256
          sha256sum "$arm_src" | awk '{print $1}' > spored-linux-arm64.sha256
          sha256sum "$win_src" | awk '{print $1}' > spored-windows-amd64.exe.sha256

          # Publisher signatures (spore-host#440). Sign each spored binary with the
          # spore.host KMS asymmetric key (ECDSA_SHA_256) in the infra account; the
          # private key never leaves KMS. spawn's bootstrap verifies the .sig with
          # openssl against the public key COMPILED INTO spawn — so the trust root
          # is the spawn binary, not this bucket. Emits base64 DER .sig files.
          #
          # SPORED_SIGNING_KEY_ID is the KMS key ARN/alias; when unset (key not yet
          # provisioned), signing is skipped and only .sha256 is published — the
          # bootstrap then stays in sha256-only mode, matching a spawn build with no
          # key compiled in. This keeps releases working during rollout.
          sign_blob() {  # $1=src file  $2=output .sig
            # KMS Sign caps the request at ~200KB, so we CANNOT send the ~80MB
            # spored binary as a RAW message. Instead compute its SHA-256 digest
            # (32 bytes) and sign with --message-type DIGEST. ECDSA signs the
            # digest either way, so the resulting signature still verifies with
            # `openssl dgst -sha256 -verify` (which hashes the file then checks) —
            # the bootstrap needs no change. (#440)
            digest="/tmp/$(basename "$1").sha256.raw"
            openssl dgst -sha256 -binary "$1" > "$digest"
            aws kms sign \
              --key-id "$SPORED_SIGNING_KEY_ID" \
              --message-type DIGEST \
              --signing-algorithm ECDSA_SHA_256 \
              --message "fileb://$digest" \
              --query Signature --output text \
              > "$2"  # already base64 (KMS returns base64 text)
          }
          SIGN=0
          if [ -n "${SPORED_SIGNING_KEY_ID:-}" ]; then
            SIGN=1
            sign_blob "$amd_src" spored-linux-amd64.sig
            sign_blob "$arm_src" spored-linux-arm64.sig
            sign_blob "$win_src" spored-windows-amd64.exe.sig
            echo "🔏 Signed spored binaries with KMS key ${SPORED_SIGNING_KEY_ID}"
          else
            echo "⚠️  SPORED_SIGNING_KEY_ID unset — publishing sha256 only (no publisher signature)"
          fi

          # Emit every copy as a NUL-separated "src<NUL>dest" pair stream, then run
          # them all through a bounded parallel pool. The copies are independent;
          # serially they cost full latency each, in parallel ~seconds. xargs -0 -n2
          # hands each pair to do_copy; any non-zero `aws cp` makes xargs exit
          # non-zero, and `set -e` then fails the step (no silent partial upload).
          # NUL separation is portable (GNU xargs) and safe regardless of paths.
          emit_copies() {
            for entry in \
              "amd64:$amd_src:spored-linux-amd64.sha256:spored-linux-amd64.sig" \
              "arm64:$arm_src:spored-linux-arm64.sha256:spored-linux-arm64.sig"; do
              arch="${entry%%:*}"; rest="${entry#*:}"; src="${rest%%:*}"; rest="${rest#*:}"; sha="${rest%%:*}"; sig="${rest#*:}"
              for bucket in "${BUCKETS[@]}"; do
                printf '%s\0%s\0' "$src" "s3://${bucket}/${PROJECT}/spored-linux-${arch}"
                printf '%s\0%s\0' "$sha" "s3://${bucket}/${PROJECT}/spored-linux-${arch}.sha256"
                printf '%s\0%s\0' "$src" "s3://${bucket}/spored-linux-${arch}"
                printf '%s\0%s\0' "$sha" "s3://${bucket}/spored-linux-${arch}.sha256"
                printf '%s\0%s\0' "$src" "s3://${bucket}/${PROJECT}/versions/${VERSION}/spored-linux-${arch}"
                # Versioned checksum too, so `spawn upgrade-spored --version X` can
                # verify a pinned download (the un-versioned latest path already
                # has one; the versioned path was missing it). (#234)
                printf '%s\0%s\0' "$sha" "s3://${bucket}/${PROJECT}/versions/${VERSION}/spored-linux-${arch}.sha256"
                # Publisher signature (#440) alongside the binary at every path the
                # bootstrap might read (${...}.sig), when signing is enabled.
                if [ "$SIGN" = "1" ]; then
                  printf '%s\0%s\0' "$sig" "s3://${bucket}/${PROJECT}/spored-linux-${arch}.sig"
                  printf '%s\0%s\0' "$sig" "s3://${bucket}/spored-linux-${arch}.sig"
                  printf '%s\0%s\0' "$sig" "s3://${bucket}/${PROJECT}/versions/${VERSION}/spored-linux-${arch}.sig"
                fi
              done
            done
            # Windows spored (amd64 only) — same paths so install-spored.ps1 mirrors
            # install-spored.sh (#77).
            for bucket in "${BUCKETS[@]}"; do
              printf '%s\0%s\0' "$win_src" "s3://${bucket}/${PROJECT}/spored-windows-amd64.exe"
              printf '%s\0%s\0' "spored-windows-amd64.exe.sha256" "s3://${bucket}/${PROJECT}/spored-windows-amd64.exe.sha256"
              printf '%s\0%s\0' "$win_src" "s3://${bucket}/spored-windows-amd64.exe"
              printf '%s\0%s\0' "spored-windows-amd64.exe.sha256" "s3://${bucket}/spored-windows-amd64.exe.sha256"
              printf '%s\0%s\0' "$win_src" "s3://${bucket}/${PROJECT}/versions/${VERSION}/spored-windows-amd64.exe"
              printf '%s\0%s\0' "spored-windows-amd64.exe.sha256" "s3://${bucket}/${PROJECT}/versions/${VERSION}/spored-windows-amd64.exe.sha256"
              if [ "$SIGN" = "1" ]; then
                printf '%s\0%s\0' "spored-windows-amd64.exe.sig" "s3://${bucket}/${PROJECT}/spored-windows-amd64.exe.sig"
                printf '%s\0%s\0' "spored-windows-amd64.exe.sig" "s3://${bucket}/spored-windows-amd64.exe.sig"
                printf '%s\0%s\0' "spored-windows-amd64.exe.sig" "s3://${bucket}/${PROJECT}/versions/${VERSION}/spored-windows-amd64.exe.sig"
              fi
            done
          }

          # One copy: dest's region is the segment after "spawn-binaries-" in the
          # bucket name. Exported so xargs' subshells can call it.
          do_copy() {
            src="$1"; dest="$2"
            bucket="${dest#s3://}"; bucket="${bucket%%/*}"
            region="${bucket#spawn-binaries-}"
            aws s3 cp "$src" "$dest" --region "$region" --only-show-errors
          }
          export -f do_copy

          emit_copies | xargs -0 -P 16 -n 2 bash -c 'do_copy "$1" "$2"' _

          echo "✅ Uploaded spored ${VERSION} (linux+windows) to ${#BUCKETS[@]} regions (parallel)"

      # Nudge the umbrella docs repo to vendor this release's generated reference
      # (docs/gen/spawn/). Fires repository_dispatch → sync-cli-docs.yaml, which
      # opens a PR; merging deploys. Needs a cross-repo PAT (DOCS_SYNC_TOKEN) —
      # the default GITHUB_TOKEN can't dispatch to another repo. If the secret is
      # absent the step skips cleanly: the sync workflow's weekly schedule is the
      # backstop, so a missing token never fails a release.
      - name: Notify docs site of new release
        if: ${{ !cancelled() }}
        env:
          DOCS_SYNC_TOKEN: ${{ secrets.DOCS_SYNC_TOKEN }}
        run: |
          if [ -z "${DOCS_SYNC_TOKEN:-}" ]; then
            echo "DOCS_SYNC_TOKEN not set — skipping docs dispatch (weekly sync will catch up)."
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer ${DOCS_SYNC_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/spore-host/spore-host/dispatches \
            -d '{"event_type":"cli-docs-updated","client_payload":{"cli":"spawn"}}'
          echo "✅ Dispatched cli-docs-updated (spawn) to the docs repo"
